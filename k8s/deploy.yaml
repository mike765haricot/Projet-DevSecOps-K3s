apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: backend-api:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: SECRET_DATA
          value: "SuperSecretPassword123"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
spec:
  selector:
    app: backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: app2-sa
      automountServiceAccountToken: true
      containers:
      - name: frontend
        image: frontend-web:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: BACKEND_URL
          value: "http://backend-svc:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
  type: NodePort
